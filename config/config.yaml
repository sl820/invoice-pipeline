# invoice-pipeline 配置文件

## 默认路径

```yaml
source_dir: E:/阿里发票/阿里257张
archive_root: null  # 不归档则保留原位
bl_model: qwen3-vl-plus
mapping_reuse: true  # 优先复用含 amount 字段的 mapping-*.json
```

## 抬头清洗规则

- Windows 非法字符（反斜杠/斜杠/冒号/星号/问号/引号/小于/大于/竖线）替换为 _
- 保留：中文、英文、空格、括号、&、.、-

## 冲突处理

同 payer 已有文件：

- SHA256 相同 → 跳过（幂等）
- SHA256 不同 → 加 (2), (3) ... 后缀

## bl 调用

Step 2 OCR 当前走 pdftoppm + bl vision describe + Node 正则路径（见 scripts/Ocr-Bailian.ps1 + upload/Ocr-Parse.js）。等价命令行：

```bash
pdftoppm -r 200 -png -f 1 -l 1 invoice.pdf invoice-p1
bl vision describe \
  --image invoice-p1.png \
  --prompt "$(cat prompts/extract-payer.md)" \
  --model qwen3-vl-plus \
  --output json
node upload/Ocr-Parse.js invoice-ocr.txt
```
